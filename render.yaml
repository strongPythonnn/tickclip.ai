services:
  - type: web
    name: tickclip-ai
    runtime: python
    buildCommand: "pip install -r api/requirements.txt"
    startCommand: "uvicorn api.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: KEEPA_API_KEY
        sync: false
      - key: AMAZON_ACCESS_KEY
        sync: false
      - key: AMAZON_SECRET_KEY
        sync: false
      - key: AMAZON_PARTNER_TAG
        sync: false
      - key: AMAZON_REGION
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
