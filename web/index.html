<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TickClip.ai — Fiduciary AI Shopping Decisions</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #fafafa; color: #1a1a1a; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ── */
.container { max-width: 800px; margin: 0 auto; padding: 0 24px; }

/* ── Header ── */
header { text-align: center; padding: 56px 0 28px; }
header h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.5px; }
header h1 .green { color: #10b981; }
header p { color: #6b7280; font-size: 1.05rem; margin-top: 6px; }

/* ── Search ── */
.search-wrap { display: flex; gap: 8px; margin: 28px auto; max-width: 580px; }
.search-wrap input {
  flex: 1; padding: 14px 18px; font-size: 1rem;
  border: 1px solid #d1d5db; border-radius: 10px;
  outline: none; transition: border-color .15s;
}
.search-wrap input:focus { border-color: #2563eb; }
.search-wrap button {
  padding: 14px 28px; font-size: 1rem; font-weight: 600;
  background: #1a1a1a; color: #fff; border: none; border-radius: 10px;
  cursor: pointer; transition: background .15s; white-space: nowrap;
}
.search-wrap button:hover { background: #333; }
.search-wrap button:disabled { opacity: .5; cursor: not-allowed; }

/* ── Search Results ── */
.search-results { max-width: 580px; margin: 0 auto 24px; display: flex; flex-direction: column; gap: 6px; }
.search-results button {
  width: 100%; text-align: left; padding: 12px 16px; background: #fff;
  border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer;
  font-size: .95rem; transition: background .1s;
}
.search-results button:hover { background: #f3f4f6; }
.search-results button code { color: #6b7280; font-size: .82rem; margin-left: 6px; }

/* ── Loading ── */
.msg { text-align: center; padding: 24px; color: #6b7280; font-size: .95rem; }
.msg.error { color: #ef4444; }
.loader { display: inline-block; width: 20px; height: 20px; border: 2px solid #e5e7eb;
  border-top-color: #10b981; border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Eval Card ── */
.eval-card {
  background: #fff; border-radius: 16px; padding: 36px 32px;
  margin: 20px auto 32px; border: 1px solid #e5e7eb;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}

/* Badge */
.badge-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: 800; letter-spacing: 1px;
  padding: 10px 28px; border-radius: 10px; color: #fff;
}
.badge.TICK { background: #10b981; }
.badge.CLIP { background: #f59e0b; }
.badge.SKIP { background: #ef4444; }
.confidence-bar { flex: 1; min-width: 140px; }
.confidence-bar .cb-label { font-size: .78rem; color: #6b7280; margin-bottom: 4px; }
.confidence-bar .cb-track { height: 8px; background: #f3f4f6; border-radius: 4px; overflow: hidden; }
.confidence-bar .cb-fill { height: 100%; border-radius: 4px; transition: width .4s; }

/* Product header */
.product-head { display: flex; gap: 20px; margin-bottom: 24px; align-items: center; }
.product-head img {
  width: 96px; height: 96px; object-fit: contain; border-radius: 10px;
  background: #f9fafb; border: 1px solid #e5e7eb; flex-shrink: 0;
}
.product-head h2 { font-size: 1.15rem; font-weight: 600; }
.product-head .asin-label { color: #9ca3af; font-size: .82rem; display: block; margin-top: 4px; }

/* Metrics grid */
.metrics {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px; margin-bottom: 24px;
}
.metric { background: #f9fafb; border-radius: 10px; padding: 14px; text-align: center; }
.metric .label { font-size: .72rem; color: #6b7280; text-transform: uppercase; letter-spacing: .6px; }
.metric .value { font-size: 1.2rem; font-weight: 700; margin-top: 4px; }
.metric .value.good { color: #10b981; }
.metric .value.warn { color: #f59e0b; }
.metric .value.bad { color: #ef4444; }

/* Explanation */
.explanation { margin-bottom: 24px; }
.explanation h3 { font-size: .92rem; font-weight: 600; margin-bottom: 8px; }
.explanation ul { list-style: none; padding: 0; }
.explanation li {
  padding: 8px 12px; margin-bottom: 6px; font-size: .88rem; color: #374151;
  background: #f9fafb; border-radius: 8px; border-left: 3px solid #d1d5db;
}

/* Chart */
.chart-wrap { margin-bottom: 28px; }
.chart-wrap h3 { font-size: .92rem; font-weight: 600; margin-bottom: 10px; }
.chart-wrap svg { width: 100%; height: 220px; }

/* ── Section headers ── */
.section { margin-bottom: 28px; }
.section-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.section-header h3 { font-size: .95rem; font-weight: 700; }
.section-header .count {
  font-size: .72rem; background: #f3f4f6; color: #6b7280;
  padding: 2px 8px; border-radius: 10px; font-weight: 500;
}

/* ── Source cards (retailers, deals, alternatives, DIY) ── */
.source-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px;
}
.source-card {
  display: block; padding: 14px 16px; border: 1px solid #e5e7eb; border-radius: 12px;
  background: #fff; transition: box-shadow .15s, border-color .15s; text-decoration: none; color: inherit;
}
.source-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.07); border-color: #d1d5db; text-decoration: none; }
.sc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.sc-badge {
  font-size: .68rem; font-weight: 700; color: #fff; padding: 2px 8px;
  border-radius: 6px; letter-spacing: .3px; text-transform: uppercase; white-space: nowrap;
}
.sc-category {
  font-size: .65rem; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px;
  margin-left: auto;
}
.sc-title { font-weight: 600; font-size: .88rem; line-height: 1.35; margin-bottom: 4px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.sc-snippet { font-size: .8rem; color: #6b7280; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.sc-domain { font-size: .7rem; color: #9ca3af; margin-top: 6px; }

/* ── Promise ── */
.promise {
  margin: 32px auto; max-width: 580px; text-align: center;
  border: 1px solid #d1fae5; background: #ecfdf5; border-radius: 12px;
  padding: 20px;
}
.promise h4 { font-size: .88rem; font-weight: 700; color: #065f46; margin-bottom: 4px; }
.promise p { font-size: .82rem; color: #047857; }

footer { text-align: center; padding: 28px 0; color: #9ca3af; font-size: .78rem; }

.back-link {
  display: inline-block; margin-bottom: 14px; font-size: .86rem;
  color: #6b7280; cursor: pointer;
}
.back-link:hover { color: #1a1a1a; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .container { padding: 0 16px; }
  .eval-card { padding: 24px 18px; }
  .source-grid { grid-template-columns: 1fr; }
  .product-head img { width: 64px; height: 64px; }
}
</style>
</head>
<body>
<div class="container" id="app">
  <header>
    <h1>Tick<span class="green">Clip</span>.ai</h1>
    <p>Fiduciary AI shopping decisions — buy, wait, or skip.</p>
  </header>

  <div id="search-section">
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="Search product or paste Amazon ASIN / URL..." />
      <button id="search-btn" onclick="doSearch()">Evaluate</button>
    </div>
    <div id="search-results" class="search-results"></div>
    <div id="search-msg" class="msg"></div>
  </div>

  <div id="eval-section" style="display:none"></div>

  <div class="promise">
    <h4>Fiduciary Promise</h4>
    <p>We do not earn from pushing sales. We help you decide: buy, wait, or skip.</p>
  </div>

  <footer>&copy; 2026 TickClip.ai</footer>
</div>

<script>
const API = location.origin;
const $input   = document.getElementById('search-input');
const $btn     = document.getElementById('search-btn');
const $results = document.getElementById('search-results');
const $msg     = document.getElementById('search-msg');
const $search  = document.getElementById('search-section');
const $eval    = document.getElementById('eval-section');

$input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = $input.value.trim();
  if (!q) return;
  $btn.disabled = true;
  $results.innerHTML = '';
  $msg.className = 'msg';
  $msg.innerHTML = '<span class="loader"></span>Searching...';

  const asinMatch = q.match(/^[A-Z0-9]{10}$/) || q.match(/\/(?:dp|gp\/product|ASIN)\/([A-Z0-9]{10})/);
  if (asinMatch) {
    const asin = asinMatch[1] || q;
    $msg.textContent = '';
    $btn.disabled = false;
    return doEvaluate(asin);
  }

  try {
    const resp = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Search failed');
    $msg.textContent = '';
    const items = data.results || [];
    if (!items.length) { $msg.textContent = 'No results found.'; return; }
    items.forEach(item => {
      const btn = document.createElement('button');
      btn.innerHTML = `${item.title || 'Product'} <code>${item.asin}</code>`;
      btn.onclick = () => doEvaluate(item.asin);
      $results.appendChild(btn);
    });
  } catch (err) {
    $msg.className = 'msg error';
    $msg.textContent = err.message;
  } finally {
    $btn.disabled = false;
  }
}

async function doEvaluate(asin) {
  $search.style.display = 'none';
  $eval.style.display = '';
  $eval.innerHTML = '<div class="msg"><span class="loader"></span>Evaluating product across multiple sources...</div>';

  try {
    const resp = await fetch(`${API}/api/evaluate?asin=${asin}`);
    const d = await resp.json();
    if (!resp.ok) throw new Error(d.detail || 'Evaluation failed');
    renderEval(d);
  } catch (err) {
    $eval.innerHTML = `<div class="msg error">${err.message}</div>
      <div style="text-align:center"><span class="back-link" onclick="goBack()">&#8592; Back to search</span></div>`;
  }
}

function goBack() {
  $eval.style.display = 'none';
  $eval.innerHTML = '';
  $search.style.display = '';
}

function renderEval(d) {
  let h = `<span class="back-link" onclick="goBack()">&#8592; Back to search</span>`;
  h += `<div class="eval-card">`;

  // Badge + confidence bar
  const confColor = d.decision === 'TICK' ? '#10b981' : d.decision === 'CLIP' ? '#f59e0b' : '#ef4444';
  h += `<div class="badge-row">
    <span class="badge ${d.decision}">${d.decision}</span>
    <div class="confidence-bar">
      <div class="cb-label">Confidence ${d.confidence}%</div>
      <div class="cb-track"><div class="cb-fill" style="width:${d.confidence}%;background:${confColor}"></div></div>
    </div>
  </div>`;

  // Product
  h += `<div class="product-head">`;
  if (d.image) h += `<img src="${d.image}" alt="" />`;
  h += `<div><h2>${esc(d.title)}</h2><span class="asin-label">${d.asin}</span></div></div>`;

  // Metrics
  const riskClass = d.seller_risk === 'low' ? 'good' : d.seller_risk === 'high' ? 'bad' : 'warn';
  const volClass = d.volatility_score < 0.08 ? 'good' : d.volatility_score >= 0.15 ? 'bad' : 'warn';
  h += `<div class="metrics">
    <div class="metric"><div class="label">Current</div><div class="value">$${fmt(d.current_price)}</div></div>
    <div class="metric"><div class="label">Historic Low</div><div class="value good">$${fmt(d.hist_low)}</div></div>
    <div class="metric"><div class="label">90-Day Avg</div><div class="value">$${fmt(d.avg_90d)}</div></div>
    <div class="metric"><div class="label">Volatility</div><div class="value ${volClass}">${d.volatility_score != null ? (d.volatility_score * 100).toFixed(1) + '%' : '—'}</div></div>
    <div class="metric"><div class="label">Seller Risk</div><div class="value ${riskClass}" style="text-transform:capitalize">${d.seller_risk}</div></div>
  </div>`;

  // Explanation
  if (d.explanation && d.explanation.length) {
    h += `<div class="explanation"><h3>Analysis</h3><ul>`;
    d.explanation.forEach(e => { h += `<li>${esc(e)}</li>`; });
    h += `</ul></div>`;
  }

  // Chart
  if (d.price_series && d.price_series.length > 1) {
    h += `<div class="chart-wrap"><h3>Price History</h3>${buildChart(d.price_series, confColor)}</div>`;
  }

  h += `</div>`; // end eval-card

  // Retailer prices — always shown
  if (d.retailer_prices && d.retailer_prices.length) {
    h += renderSourceSection('Compare Across Retailers', d.retailer_prices, 'retailer');
  }

  // Deals & coupons — always shown
  if (d.deals && d.deals.length) {
    h += renderSourceSection('Deals & Coupons', d.deals, 'deal');
  }

  // Alternatives — CLIP/SKIP only
  if (d.alternatives && d.alternatives.length) {
    h += renderSourceSection('Better Alternatives', d.alternatives, 'alternative');
  }

  // DIY — CLIP/SKIP only
  if (d.diy_articles && d.diy_articles.length) {
    h += renderSourceSection('DIY / Repair / Substitutes', d.diy_articles, 'diy');
  }

  $eval.innerHTML = h;
}

function renderSourceSection(title, items, fallbackCategory) {
  let h = `<div class="section">
    <div class="section-header"><h3>${title}</h3><span class="count">${items.length} found</span></div>
    <div class="source-grid">`;
  items.forEach(a => {
    const cat = a.category || fallbackCategory;
    const catLabels = { retailer: 'Retailer', deal: 'Deal', alternative: 'Alternative', diy: 'DIY' };
    const color = a.retailer_color || '#6b7280';
    const name = a.retailer_name || a.source || '';
    h += `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="source-card">
      <div class="sc-top">
        <span class="sc-badge" style="background:${color}">${esc(name)}</span>
        <span class="sc-category">${catLabels[cat] || cat}</span>
      </div>
      <div class="sc-title">${esc(a.title)}</div>
      ${a.snippet ? `<div class="sc-snippet">${esc(a.snippet)}</div>` : ''}
      <div class="sc-domain">${esc(a.source)}</div>
    </a>`;
  });
  h += `</div></div>`;
  return h;
}

/* ── SVG chart ── */
function buildChart(series, color) {
  const W = 700, H = 210, PL = 52, PR = 16, PT = 14, PB = 28;
  const cw = W - PL - PR, ch = H - PT - PB;
  const prices = series.map(p => p.price);
  const mn = Math.min(...prices), mx = Math.max(...prices);
  const range = mx - mn || 1;

  const pts = series.map((p, i) => {
    const x = PL + (i / (series.length - 1)) * cw;
    const y = PT + ch - ((p.price - mn) / range) * ch;
    return { x, y, date: p.date, price: p.price };
  });

  const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area = line + ` L${pts[pts.length-1].x.toFixed(1)},${PT+ch} L${pts[0].x.toFixed(1)},${PT+ch} Z`;

  const ySteps = 4;
  let yLabels = '';
  for (let i = 0; i <= ySteps; i++) {
    const val = mn + (range * i / ySteps);
    const y = PT + ch - (i / ySteps) * ch;
    yLabels += `<text x="${PL-8}" y="${y+4}" text-anchor="end" fill="#9ca3af" font-size="11">$${val.toFixed(0)}</text>`;
    yLabels += `<line x1="${PL}" x2="${PL+cw}" y1="${y}" y2="${y}" stroke="#f3f4f6" />`;
  }

  const xIdxs = [0, Math.floor(series.length/2), series.length-1];
  let xLabels = '';
  xIdxs.forEach(i => {
    xLabels += `<text x="${pts[i].x}" y="${H-4}" text-anchor="middle" fill="#9ca3af" font-size="11">${series[i].date.slice(0,7)}</text>`;
  });

  const c = color || '#10b981';
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${yLabels}${xLabels}
    <path d="${area}" fill="${c}" fill-opacity="0.07" />
    <path d="${line}" fill="none" stroke="${c}" stroke-width="2" stroke-linejoin="round" />
    <circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="4.5" fill="${c}" />
    <circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="8" fill="${c}" fill-opacity="0.15" />
  </svg>`;
}

/* ── Helpers ── */
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmt(v) { return v != null ? Number(v).toFixed(2) : '—'; }
</script>
</body>
</html>
