<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TickClip.ai — Fiduciary AI Shopping Decisions</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #f8f9fa; color: #1a1a1a; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Narrow container (search) ── */
.container-narrow { max-width: 640px; margin: 0 auto; padding: 0 20px; }

/* ── Wide container (results) ── */
.container-wide { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

/* ── Header ── */
header { text-align: center; padding: 48px 0 24px; }
header h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.5px; }
header h1 .g { color: #10b981; }
header p { color: #6b7280; font-size: 1rem; margin-top: 4px; }

/* ── Search ── */
.search-wrap { display: flex; gap: 8px; margin: 24px auto; }
.search-wrap input {
  flex: 1; padding: 14px 18px; font-size: 1rem;
  border: 1px solid #d1d5db; border-radius: 10px; outline: none;
  transition: border-color .15s;
}
.search-wrap input:focus { border-color: #2563eb; }
.search-wrap button {
  padding: 14px 24px; font-size: .95rem; font-weight: 600;
  background: #1a1a1a; color: #fff; border: none; border-radius: 10px;
  cursor: pointer; white-space: nowrap; transition: background .15s;
}
.search-wrap button:hover { background: #333; }
.search-wrap button:disabled { opacity: .5; cursor: not-allowed; }
.search-results { margin: 0 auto 20px; display: flex; flex-direction: column; gap: 6px; }
.search-results button {
  width: 100%; text-align: left; padding: 12px 14px; background: #fff;
  border: 1px solid #e5e7eb; border-radius: 10px; cursor: pointer;
  font-size: .92rem; transition: all .15s; display: flex; align-items: center; gap: 10px;
}
.search-results button:hover { background: #f9fafb; border-color: #d1d5db; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.search-results button code { color: #6b7280; font-size: .78rem; margin-left: auto; flex-shrink: 0; }
.sr-badge {
  font-size: .62rem; font-weight: 800; letter-spacing: .5px; padding: 3px 8px;
  border-radius: 5px; color: #fff; flex-shrink: 0; min-width: 38px; text-align: center;
}
.sr-badge.TICK { background: #10b981; }
.sr-badge.CLIP { background: #f59e0b; }
.sr-badge.SKIP { background: #ef4444; }
.sr-info { flex: 1; min-width: 0; }
.sr-title { font-weight: 600; font-size: .88rem; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.sr-meta { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.sr-price { font-size: .8rem; font-weight: 700; color: #1a1a1a; }
.sr-conf { font-size: .68rem; color: #9ca3af; }

/* ── Loading / messages ── */
.msg { text-align: center; padding: 24px; color: #6b7280; font-size: .95rem; }
.msg.error { color: #ef4444; }
.loader { display: inline-block; width: 18px; height: 18px; border: 2px solid #e5e7eb;
  border-top-color: #10b981; border-radius: 50%; animation: spin .6s linear infinite;
  vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Two-column layout ── */
.layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }
@media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }

/* ── Main column ── */
.eval-card {
  background: #fff; border-radius: 14px; padding: 32px 28px;
  border: 1px solid #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.04);
}

/* Badge row */
.badge-row { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
.badge {
  font-size: 1.4rem; font-weight: 800; letter-spacing: 1px;
  padding: 8px 24px; border-radius: 10px; color: #fff;
}
.badge.TICK { background: #10b981; }
.badge.CLIP { background: #f59e0b; }
.badge.SKIP { background: #ef4444; }
.conf-bar { flex: 1; min-width: 120px; }
.conf-bar .cl { font-size: .75rem; color: #6b7280; margin-bottom: 3px; }
.conf-bar .ct { height: 7px; background: #f3f4f6; border-radius: 4px; overflow: hidden; }
.conf-bar .cf { height: 100%; border-radius: 4px; }

/* Product head */
.prod { display: flex; gap: 16px; margin-bottom: 20px; align-items: center; }
.prod img { width: 80px; height: 80px; object-fit: contain; border-radius: 8px;
  background: #f9fafb; border: 1px solid #e5e7eb; flex-shrink: 0; }
.prod h2 { font-size: 1.05rem; font-weight: 600; }
.prod .asin { color: #9ca3af; font-size: .8rem; display: block; margin-top: 2px; }

/* Metrics */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 20px; }
.m { background: #f9fafb; border-radius: 8px; padding: 12px; text-align: center; }
.m .l { font-size: .68rem; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; }
.m .v { font-size: 1.1rem; font-weight: 700; margin-top: 2px; }
.m .v.gd { color: #10b981; } .m .v.wn { color: #f59e0b; } .m .v.bd { color: #ef4444; }

/* Explanation */
.expl { margin-bottom: 20px; }
.expl h3 { font-size: .88rem; font-weight: 600; margin-bottom: 8px; }
.expl ul { list-style: none; padding: 0; }
.expl li { padding: 7px 10px; margin-bottom: 4px; font-size: .84rem; color: #374151;
  background: #f9fafb; border-radius: 6px; border-left: 3px solid #d1d5db; }

/* Chart */
.chart-box { margin-bottom: 20px; }
.chart-box h3 { font-size: .88rem; font-weight: 600; margin-bottom: 8px; }
.chart-box svg { width: 100%; height: 200px; }

/* ── Sidebar ── */
.sidebar { display: flex; flex-direction: column; gap: 16px; }

/* Review summary card */
.review-card {
  background: #fff; border-radius: 14px; padding: 24px 20px;
  border: 1px solid #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.review-card h3 { font-size: .92rem; font-weight: 700; margin-bottom: 12px; }

/* Sentiment gauge */
.gauge { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.gauge-ring {
  width: 56px; height: 56px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-size: .88rem; font-weight: 800; color: #fff;
}
.gauge-info .gi-label { font-size: .92rem; font-weight: 600; }
.gauge-info .gi-count { font-size: .76rem; color: #6b7280; }

/* Sentiment bar */
.sent-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
.sent-bar .sb-pos { background: #10b981; } .sent-bar .sb-mix { background: #f59e0b; }
.sent-bar .sb-neg { background: #ef4444; } .sent-bar .sb-neu { background: #d1d5db; }
.sent-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.sent-legend span { font-size: .7rem; color: #6b7280; display: flex; align-items: center; gap: 3px; }
.sent-legend .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Pros / cons */
.pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.pc-col h4 { font-size: .72rem; text-transform: uppercase; letter-spacing: .5px; color: #6b7280; margin-bottom: 4px; }
.pc-col .tag {
  display: inline-block; font-size: .72rem; padding: 2px 7px; border-radius: 4px;
  margin: 0 3px 3px 0; font-weight: 500;
}
.pc-col.pro .tag { background: #d1fae5; color: #065f46; }
.pc-col.con .tag { background: #fee2e2; color: #991b1b; }

.verdict { font-size: .82rem; color: #374151; padding: 10px; background: #f9fafb; border-radius: 8px; line-height: 1.5; }

/* Review list items */
.rv-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.rv-item {
  display: block; padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px;
  background: #fff; transition: box-shadow .15s; text-decoration: none; color: inherit;
}
.rv-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); text-decoration: none; }
.rv-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.rv-badge {
  font-size: .6rem; font-weight: 700; color: #fff; padding: 1px 6px;
  border-radius: 4px; text-transform: uppercase;
}
.rv-sent {
  font-size: .6rem; padding: 1px 6px; border-radius: 4px; font-weight: 600;
  margin-left: auto;
}
.rv-sent.positive { background: #d1fae5; color: #065f46; }
.rv-sent.negative { background: #fee2e2; color: #991b1b; }
.rv-sent.mixed { background: #fef3c7; color: #92400e; }
.rv-sent.neutral { background: #f3f4f6; color: #6b7280; }
.rv-title { font-size: .8rem; font-weight: 600; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.rv-snip { font-size: .72rem; color: #6b7280; margin-top: 3px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ── Sidebar compact cards (retailers, deals in sidebar) ── */
.side-section { background: #fff; border-radius: 14px; padding: 20px 18px;
  border: 1px solid #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.side-section h3 { font-size: .88rem; font-weight: 700; margin-bottom: 10px; }
.side-section .cnt { font-size: .7rem; color: #9ca3af; font-weight: 400; margin-left: 6px; }

.side-list { display: flex; flex-direction: column; gap: 6px; }
.sl-item {
  display: block; padding: 8px 10px; border: 1px solid #f3f4f6; border-radius: 8px;
  text-decoration: none; color: inherit; transition: background .1s;
}
.sl-item:hover { background: #f9fafb; text-decoration: none; }
.sl-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.sl-badge { font-size: .6rem; font-weight: 700; color: #fff; padding: 1px 6px; border-radius: 4px; }
.sl-title { font-size: .78rem; font-weight: 600; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.sl-snip { font-size: .7rem; color: #6b7280; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

/* ── Full-width sections below layout (alternatives, DIY) ── */
.section { margin-bottom: 24px; }
.section-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.section-hdr h3 { font-size: .92rem; font-weight: 700; }
.section-hdr .cnt { font-size: .7rem; background: #f3f4f6; color: #6b7280;
  padding: 2px 8px; border-radius: 10px; }
.source-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.sc {
  display: block; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 10px;
  background: #fff; transition: box-shadow .15s; text-decoration: none; color: inherit;
}
.sc:hover { box-shadow: 0 2px 10px rgba(0,0,0,.06); text-decoration: none; }
.sc-top { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.sc-badge { font-size: .62rem; font-weight: 700; color: #fff; padding: 1px 7px;
  border-radius: 5px; text-transform: uppercase; }
.sc-cat { font-size: .6rem; color: #9ca3af; text-transform: uppercase; margin-left: auto; }
.sc-title { font-weight: 600; font-size: .82rem; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.sc-snip { font-size: .74rem; color: #6b7280; margin-top: 3px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ── Manipulation alert ── */
.manip-card {
  border-radius: 12px; padding: 18px 20px; margin-bottom: 20px;
}
.manip-card.risk-high { background: #fef2f2; border: 1px solid #fecaca; }
.manip-card.risk-medium { background: #fffbeb; border: 1px solid #fde68a; }
.manip-card.risk-low { background: #f0fdf4; border: 1px solid #bbf7d0; }
.manip-card.risk-none { background: #f0fdf4; border: 1px solid #bbf7d0; }
.manip-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.manip-icon { font-size: 1.3rem; flex-shrink: 0; }
.manip-title { font-size: .88rem; font-weight: 700; }
.manip-title.high { color: #dc2626; }
.manip-title.medium { color: #d97706; }
.manip-title.low { color: #16a34a; }
.manip-title.none { color: #16a34a; }
.manip-score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.manip-score-track { flex: 1; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
.manip-score-fill { height: 100%; border-radius: 4px; }
.manip-score-label { font-size: .75rem; color: #6b7280; white-space: nowrap; }
.manip-prices { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.manip-price {
  flex: 1; min-width: 100px; padding: 10px 12px; border-radius: 8px;
  text-align: center; font-size: .78rem;
}
.manip-price .mp-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .4px; color: #6b7280; }
.manip-price .mp-val { font-size: 1rem; font-weight: 700; margin-top: 2px; }
.manip-price.current-bg { background: #f3f4f6; }
.manip-price.true-bg { background: #d1fae5; }
.manip-price.inflated-bg { background: #fee2e2; }
.tactic-list { display: flex; flex-direction: column; gap: 8px; }
.tactic-item { padding: 10px 12px; border-radius: 8px; background: #fff; border: 1px solid #e5e7eb; }
.tactic-name { font-size: .8rem; font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.tactic-sev {
  font-size: .6rem; padding: 1px 6px; border-radius: 4px; font-weight: 600;
  text-transform: uppercase; color: #fff;
}
.tactic-sev.high { background: #ef4444; }
.tactic-sev.medium { background: #f59e0b; }
.tactic-sev.low { background: #6b7280; }
.tactic-desc { font-size: .78rem; color: #374151; line-height: 1.45; }
.tactic-evidence { font-size: .7rem; color: #9ca3af; margin-top: 4px; }

/* ── Amazon offers ── */
.offer-item {
  padding: 10px 12px; border: 1px solid #f3f4f6; border-radius: 8px; margin-bottom: 6px;
}
.offer-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
.offer-price { font-size: .95rem; font-weight: 700; }
.offer-was { font-size: .78rem; color: #9ca3af; text-decoration: line-through; }
.offer-save { font-size: .68rem; font-weight: 600; color: #dc2626; background: #fee2e2;
  padding: 1px 6px; border-radius: 4px; }
.offer-prime { font-size: .6rem; font-weight: 700; color: #00485a; background: #cff4fc;
  padding: 1px 6px; border-radius: 4px; }
.offer-badge { font-size: .6rem; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
.offer-badge.buybox { background: #fef3c7; color: #92400e; }
.offer-badge.fba { background: #dbeafe; color: #1e40af; }
.offer-merchant { font-size: .72rem; color: #6b7280; }
.offer-avail { font-size: .7rem; color: #9ca3af; }
.promo-tag { display: inline-block; font-size: .7rem; padding: 2px 8px; border-radius: 4px;
  background: #fef3c7; color: #92400e; font-weight: 600; margin: 2px 2px 2px 0; }
.features-list { margin: 8px 0 0; padding: 0; list-style: none; }
.features-list li { font-size: .76rem; color: #374151; padding: 3px 0; border-bottom: 1px solid #f3f4f6;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.brand-label { font-size: .76rem; color: #6b7280; margin-bottom: 4px; }

/* Amazon deal card in grid */
.amz-deal {
  display: block; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 10px;
  background: #fff; transition: box-shadow .15s; text-decoration: none; color: inherit;
}
.amz-deal:hover { box-shadow: 0 2px 10px rgba(0,0,0,.06); text-decoration: none; }
.amz-deal-top { display: flex; gap: 10px; margin-bottom: 6px; }
.amz-deal-img { width: 48px; height: 48px; object-fit: contain; border-radius: 6px;
  background: #f9fafb; border: 1px solid #f3f4f6; flex-shrink: 0; }
.amz-deal-info { flex: 1; min-width: 0; }
.amz-deal-title { font-size: .8rem; font-weight: 600; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.amz-deal-prices { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }

/* ── Promise ── */
.promise {
  margin: 28px auto; max-width: 540px; text-align: center;
  border: 1px solid #d1fae5; background: #ecfdf5; border-radius: 12px; padding: 18px;
}
.promise h4 { font-size: .85rem; font-weight: 700; color: #065f46; margin-bottom: 3px; }
.promise p { font-size: .8rem; color: #047857; }
footer { text-align: center; padding: 24px 0; color: #9ca3af; font-size: .75rem; }
.back-link { display: inline-block; margin-bottom: 12px; font-size: .84rem; color: #6b7280; cursor: pointer; }
.back-link:hover { color: #1a1a1a; }

/* Responsive */
@media (max-width: 600px) {
  .eval-card { padding: 20px 16px; }
  .prod img { width: 56px; height: 56px; }
  .source-grid { grid-template-columns: 1fr; }
  .pros-cons { grid-template-columns: 1fr; }
}

<body>

<!-- ── SEARCH PAGE ── -->
<div id="search-section">
  <div class="container-narrow">
    <header>
      <h1>Tick<span class="g">Clip</span>.ai</h1>
      <p>Fiduciary AI shopping decisions — buy, wait, or skip.</p>
    </header>
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="Search product or paste Amazon ASIN / URL..." />
      <button id="search-btn" onclick="doSearch()">Evaluate</button>
    </div>
    <div id="search-results" class="search-results"></div>
    <div id="search-msg" class="msg"></div>
    <div class="promise">
      <h4>Fiduciary Promise</h4>
      <p>We do not earn from pushing sales. We help you decide: buy, wait, or skip.</p>
    </div>
    <footer>&copy; 2026 TickClip.ai</footer>
  </div>
</div>

<!-- ── EVALUATION PAGE ── -->
<div id="eval-section" style="display:none">
  <div class="container-wide" id="eval-content"></div>
</div>

<script>
const API = location.origin;
const $input   = document.getElementById('search-input');
const $btn     = document.getElementById('search-btn');
const $results = document.getElementById('search-results');
const $msg     = document.getElementById('search-msg');
const $search  = document.getElementById('search-section');
const $eval    = document.getElementById('eval-section');
const $content = document.getElementById('eval-content');

$input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = $input.value.trim();
  if (!q) return;
  $btn.disabled = true;
  $results.innerHTML = '';
  $msg.className = 'msg';
  $msg.innerHTML = '<span class="loader"></span>Searching...';

  const am = q.match(/^[A-Z0-9]{10}$/) || q.match(/\/(?:dp|gp\/product|ASIN)\/([A-Z0-9]{10})/);
  if (am) { $msg.textContent = ''; $btn.disabled = false; return doEvaluate(am[1] || q); }

  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Search failed');
    $msg.textContent = '';
    if (!(d.results||[]).length) { $msg.textContent = 'No results found.'; return; }
    d.results.forEach(i => {
      const b = document.createElement('button');
      const dec = i.decision || 'CLIP';
      const price = i.current_price != null ? `$${Number(i.current_price).toFixed(2)}` : '';
      const conf = i.confidence ? `${i.confidence}% confidence` : '';
      b.innerHTML = `<span class="sr-badge ${dec}">${dec}</span>`
        + `<div class="sr-info"><div class="sr-title">${esc(i.title||'Product')}</div>`
        + `<div class="sr-meta">${price?`<span class="sr-price">${price}</span>`:''}`
        + `${conf?`<span class="sr-conf">${conf}</span>`:''}</div></div>`
        + `<code>${i.asin}</code>`;
      b.onclick = () => doEvaluate(i.asin);
      $results.appendChild(b);
    });
  } catch (e) { $msg.className = 'msg error'; $msg.textContent = e.message; }
  finally { $btn.disabled = false; }
}

async function doEvaluate(asin) {
  $search.style.display = 'none';
  $eval.style.display = '';
  $content.innerHTML = '<div class="msg"><span class="loader"></span>Evaluating across retailers, reviews & deal sites...</div>';
  try {
    const r = await fetch(`${API}/api/evaluate?asin=${asin}`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Evaluation failed');
    render(d);
  } catch (e) {
    $content.innerHTML = `<div class="msg error">${e.message}</div>
      <div style="text-align:center"><span class="back-link" onclick="goBack()">&#8592; Back</span></div>`;
  }
}

function goBack() { $eval.style.display='none'; $content.innerHTML=''; $search.style.display=''; }

function render(d) {
  const cc = d.decision==='TICK'?'#10b981':d.decision==='CLIP'?'#f59e0b':'#ef4444';
  const rv = d.review_analysis || {reviews:[], summary:{}};
  const sm = rv.summary || {};
  let h = `<span class="back-link" onclick="goBack()">&#8592; Back to search</span>`;

  // ── Two column layout ──
  h += `<div class="layout">`;

  // ── MAIN COLUMN ──
  h += `<div class="main-col">`;
  h += `<div class="eval-card">`;

  // Badge
  h += `<div class="badge-row">
    <span class="badge ${d.decision}">${d.decision}</span>
    <div class="conf-bar"><div class="cl">Confidence ${d.confidence}%</div>
      <div class="ct"><div class="cf" style="width:${d.confidence}%;background:${cc}"></div></div>
    </div></div>`;

  // Product
  h += `<div class="prod">`;
  if (d.image) h += `<img src="${d.image}" alt="" />`;
  h += `<div><h2>${esc(d.title)}</h2>`;
  if (d.brand) h += `<span class="brand-label">by ${esc(d.brand)}</span> `;
  h += `<span class="asin">${d.asin}</span></div></div>`;

  // Metrics
  const rk = d.seller_risk==='low'?'gd':d.seller_risk==='high'?'bd':'wn';
  const vk = d.volatility_score<0.08?'gd':d.volatility_score>=0.15?'bd':'wn';
  h += `<div class="metrics">
    <div class="m"><div class="l">Current</div><div class="v">$${fmt(d.current_price)}</div></div>
    <div class="m"><div class="l">Historic Low</div><div class="v gd">$${fmt(d.hist_low)}</div></div>
    <div class="m"><div class="l">90-Day Avg</div><div class="v">$${fmt(d.avg_90d)}</div></div>
    <div class="m"><div class="l">Volatility</div><div class="v ${vk}">${d.volatility_score!=null?(d.volatility_score*100).toFixed(1)+'%':'—'}</div></div>
    <div class="m"><div class="l">Seller Risk</div><div class="v ${rk}" style="text-transform:capitalize">${d.seller_risk}</div></div>
  </div>`;

  // Explanation
  if (d.explanation && d.explanation.length) {
    h += `<div class="expl"><h3>Analysis</h3><ul>`;
    d.explanation.forEach(e => h += `<li>${esc(e)}</li>`);
    h += `</ul></div>`;
  }

  // Chart
  if (d.price_series && d.price_series.length > 1)
    h += `<div class="chart-box"><h3>Price History</h3>${buildChart(d.price_series, cc)}</div>`;

  // Price manipulation analysis
  h += renderManipulation(d.price_manipulation, d.current_price);

  h += `</div>`; // eval-card
  h += `</div>`; // main-col

  // ── SIDEBAR ──
  h += `<div class="sidebar">`;

  // Review summary
  h += `<div class="review-card"><h3>Review Analysis</h3>`;
  if (sm.total > 0) {
    const sc = sm.overall_score||0.5;
    const gc = sc>=0.6?'#10b981':sc>=0.4?'#f59e0b':'#ef4444';
    h += `<div class="gauge">
      <div class="gauge-ring" style="background:${gc}">${Math.round(sc*100)}</div>
      <div class="gauge-info">
        <div class="gi-label">${esc(sm.overall_label||'Mixed')}</div>
        <div class="gi-count">${sm.total} sources analyzed</div>
      </div></div>`;

    // Sentiment bar
    const tot = sm.total||1;
    h += `<div class="sent-bar">
      <div class="sb-pos" style="width:${(sm.positive_count/tot*100).toFixed(0)}%"></div>
      <div class="sb-mix" style="width:${(sm.mixed_count/tot*100).toFixed(0)}%"></div>
      <div class="sb-neg" style="width:${(sm.negative_count/tot*100).toFixed(0)}%"></div>
      <div class="sb-neu" style="width:${((sm.neutral_count||0)/tot*100).toFixed(0)}%"></div>
    </div>`;
    h += `<div class="sent-legend">
      <span><span class="dot" style="background:#10b981"></span>${sm.positive_count} positive</span>
      <span><span class="dot" style="background:#f59e0b"></span>${sm.mixed_count} mixed</span>
      <span><span class="dot" style="background:#ef4444"></span>${sm.negative_count} negative</span>
    </div>`;

    // Pros & cons
    if ((sm.top_pros&&sm.top_pros.length) || (sm.top_cons&&sm.top_cons.length)) {
      h += `<div class="pros-cons">`;
      h += `<div class="pc-col pro"><h4>Pros</h4>`;
      (sm.top_pros||[]).forEach(p => h += `<span class="tag">${esc(p)}</span>`);
      h += `</div><div class="pc-col con"><h4>Cons</h4>`;
      (sm.top_cons||[]).forEach(c => h += `<span class="tag">${esc(c)}</span>`);
      h += `</div></div>`;
    }

    if (sm.verdict) h += `<div class="verdict">${esc(sm.verdict)}</div>`;
  } else {
    h += `<div style="color:#9ca3af;font-size:.84rem">No reviews found yet.</div>`;
  }

  // Review list
  if (rv.reviews && rv.reviews.length) {
    h += `<div class="rv-list">`;
    rv.reviews.slice(0,8).forEach(r => {
      const sl = r.sentiment?r.sentiment.label:'neutral';
      h += `<a href="${esc(r.url)}" target="_blank" rel="noopener" class="rv-item">
        <div class="rv-top">
          <span class="rv-badge" style="background:${r.review_color||'#6b7280'}">${esc(r.review_source||r.source)}</span>
          <span class="rv-sent ${sl}">${sl}</span>
        </div>
        <div class="rv-title">${esc(r.title)}</div>
        ${r.snippet?`<div class="rv-snip">${esc(r.snippet)}</div>`:''}
      </a>`;
    });
    h += `</div>`;
  }
  h += `</div>`; // review-card

  // Retailers in sidebar
  if (d.retailer_prices && d.retailer_prices.length) {
    h += `<div class="side-section"><h3>Shop Across Retailers<span class="cnt">${d.retailer_prices.length}</span></h3>`;
    h += `<div class="side-list">`;
    d.retailer_prices.forEach(a => {
      h += `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="sl-item">
        <div class="sl-top"><span class="sl-badge" style="background:${a.retailer_color||'#6b7280'}">${esc(a.retailer_name||a.source)}</span></div>
        <div class="sl-title">${esc(a.title)}</div>
        ${a.snippet?`<div class="sl-snip">${esc(a.snippet)}</div>`:''}
      </a>`;
    });
    h += `</div></div>`;
  }

  // Deals in sidebar
  if (d.deals && d.deals.length) {
    h += `<div class="side-section"><h3>Deals & Coupons<span class="cnt">${d.deals.length}</span></h3>`;
    h += `<div class="side-list">`;
    d.deals.forEach(a => {
      h += `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="sl-item">
        <div class="sl-top"><span class="sl-badge" style="background:${a.retailer_color||'#6b7280'}">${esc(a.retailer_name||a.source)}</span></div>
        <div class="sl-title">${esc(a.title)}</div>
        ${a.snippet?`<div class="sl-snip">${esc(a.snippet)}</div>`:''}
      </a>`;
    });
    h += `</div></div>`;
  }

  // Amazon Offers (from PA-API)
  if (d.amazon_offers && d.amazon_offers.length) {
    h += `<div class="side-section"><h3>Amazon Offers<span class="cnt">${d.amazon_offers.length}</span></h3>`;
    d.amazon_offers.forEach(o => {
      h += `<div class="offer-item"><div class="offer-top">`;
      if (o.price_display) h += `<span class="offer-price">${esc(o.price_display)}</span>`;
      if (o.was_price_display) h += `<span class="offer-was">${esc(o.was_price_display)}</span>`;
      if (o.savings_pct) h += `<span class="offer-save">-${o.savings_pct}%</span>`;
      if (o.is_prime) h += `<span class="offer-prime">Prime</span>`;
      if (o.is_buybox) h += `<span class="offer-badge buybox">Buy Box</span>`;
      if (o.is_amazon_fulfilled) h += `<span class="offer-badge fba">FBA</span>`;
      h += `</div>`;
      if (o.merchant_name) h += `<div class="offer-merchant">Sold by ${esc(o.merchant_name)}${o.condition!=='New'?' &middot; '+esc(o.condition):''}</div>`;
      if (o.availability) h += `<div class="offer-avail">${esc(o.availability)}</div>`;
      h += `</div>`;
    });

    // Promotions
    if (d.amazon_promotions && d.amazon_promotions.length) {
      h += `<div style="margin-top:8px">`;
      d.amazon_promotions.forEach(p => {
        h += `<span class="promo-tag">${esc(p.message || p.type)}</span>`;
      });
      h += `</div>`;
    }

    // Offer summaries
    if (d.amazon_offer_summaries && d.amazon_offer_summaries.length) {
      h += `<div style="margin-top:8px;font-size:.72rem;color:#6b7280">`;
      d.amazon_offer_summaries.forEach(s => {
        if (s.lowest_price_display) {
          h += `<div>${esc(s.condition)}: ${s.offer_count} offers from ${esc(s.lowest_price_display)}</div>`;
        }
      });
      h += `</div>`;
    }

    h += `</div>`;
  }

  // Product features (from Amazon)
  if (d.features && d.features.length) {
    h += `<div class="side-section"><h3>Key Features</h3>`;
    h += `<ul class="features-list">`;
    d.features.forEach(f => h += `<li>${esc(f)}</li>`);
    h += `</ul></div>`;
  }

  h += `</div>`; // sidebar
  h += `</div>`; // layout

  // ── Full-width sections ──

  // Amazon Deals (from PA-API search)
  if (d.amazon_deals && d.amazon_deals.length) {
    h += `<div class="section" style="margin-top:24px">`;
    h += `<div class="section-hdr"><h3>Amazon Deals on Similar Products</h3><span class="cnt">${d.amazon_deals.length} found</span></div>`;
    h += `<div class="source-grid">`;
    d.amazon_deals.forEach(a => {
      h += `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="amz-deal">
        <div class="amz-deal-top">
          ${a.image?`<img class="amz-deal-img" src="${a.image}" alt=""/>`:''}
          <div class="amz-deal-info">
            <div class="amz-deal-title">${esc(a.title)}</div>
            <div class="amz-deal-prices">
              ${a.price_display?`<span class="offer-price">${esc(a.price_display)}</span>`:''}
              ${a.was_price_display?`<span class="offer-was">${esc(a.was_price_display)}</span>`:''}
              ${a.savings_pct?`<span class="offer-save">-${a.savings_pct}%</span>`:''}
              ${a.is_prime?`<span class="offer-prime">Prime</span>`:''}
              ${a.promo?`<span class="promo-tag">${esc(a.promo)}</span>`:''}
            </div>
          </div>
        </div>
        ${a.merchant?`<div style="font-size:.7rem;color:#9ca3af">Sold by ${esc(a.merchant)}</div>`:''}
      </a>`;
    });
    h += `</div></div>`;
  }

  if (d.alternatives && d.alternatives.length) {
    h += `<div class="section">`;
    h += `<div class="section-hdr"><h3>Better Alternatives</h3><span class="cnt">${d.alternatives.length} found</span></div>`;
    h += `<div class="source-grid">`;
    d.alternatives.forEach(a => {
      h += `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="sc">
        <div class="sc-top"><span class="sc-badge" style="background:${a.retailer_color||'#6b7280'}">${esc(a.retailer_name||a.source)}</span><span class="sc-cat">Alternative</span></div>
        <div class="sc-title">${esc(a.title)}</div>
        ${a.snippet?`<div class="sc-snip">${esc(a.snippet)}</div>`:''}
      </a>`;
    });
    h += `</div></div>`;
  }

  if (d.diy_articles && d.diy_articles.length) {
    h += `<div class="section">`;
    h += `<div class="section-hdr"><h3>DIY / Repair / Substitutes</h3><span class="cnt">${d.diy_articles.length} found</span></div>`;
    h += `<div class="source-grid">`;
    d.diy_articles.forEach(a => {
      h += `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="sc">
        <div class="sc-top"><span class="sc-badge" style="background:${a.retailer_color||'#6b7280'}">${esc(a.retailer_name||a.source)}</span><span class="sc-cat">DIY</span></div>
        <div class="sc-title">${esc(a.title)}</div>
        ${a.snippet?`<div class="sc-snip">${esc(a.snippet)}</div>`:''}
      </a>`;
    });
    h += `</div></div>`;
  }

  // Promise + footer
  h += `<div class="promise"><h4>Fiduciary Promise</h4>
    <p>We do not earn from pushing sales. We help you decide: buy, wait, or skip.</p></div>`;
  h += `<footer>&copy; 2026 TickClip.ai</footer>`;

  $content.innerHTML = h;
}

/* ── Price manipulation card ── */
function renderManipulation(pm, currentPrice) {
  if (!pm || pm.risk_level === undefined) return '';
  const rl = pm.risk_level; // none, low, medium, high
  const icons = { none: '\u2705', low: '\u2705', medium: '\u26A0\uFE0F', high: '\uD83D\uDEA8' };
  const titles = {
    none: 'No Price Manipulation Detected',
    low: 'Low Manipulation Risk',
    medium: 'Price Manipulation Warning',
    high: 'Price Manipulation Alert',
  };
  const scoreColor = pm.score >= 50 ? '#ef4444' : pm.score >= 25 ? '#f59e0b' : '#10b981';

  let h = `<div class="manip-card risk-${rl}">`;
  h += `<div class="manip-header">
    <span class="manip-icon">${icons[rl]}</span>
    <span class="manip-title ${rl}">${titles[rl]}</span>
  </div>`;

  // Score bar
  h += `<div class="manip-score-row">
    <div class="manip-score-track">
      <div class="manip-score-fill" style="width:${pm.score}%;background:${scoreColor}"></div>
    </div>
    <span class="manip-score-label">Risk ${pm.score}/100</span>
  </div>`;

  // True market price vs current
  if (pm.true_market_price != null) {
    h += `<div class="manip-prices">
      <div class="manip-price current-bg">
        <div class="mp-label">Listed Price</div>
        <div class="mp-val">$${fmt(currentPrice)}</div>
      </div>
      <div class="manip-price true-bg">
        <div class="mp-label">True Market Price</div>
        <div class="mp-val" style="color:#10b981">$${fmt(pm.true_market_price)}</div>
      </div>`;
    if (pm.inflated_by_pct != null && pm.inflated_by_pct > 0) {
      h += `<div class="manip-price inflated-bg">
        <div class="mp-label">Inflated By</div>
        <div class="mp-val" style="color:#ef4444">+${pm.inflated_by_pct.toFixed(0)}%</div>
      </div>`;
    }
    h += `</div>`;
  }

  if (pm.is_fake_deal) {
    h += `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:.8rem;color:#991b1b;font-weight:600">
      This \"deal\" appears to be manufactured through price inflation tactics.
    </div>`;
  }

  // Tactics
  if (pm.tactics && pm.tactics.length) {
    h += `<div class="tactic-list">`;
    pm.tactics.forEach(t => {
      h += `<div class="tactic-item">
        <div class="tactic-name">${esc(t.tactic)} <span class="tactic-sev ${t.severity}">${t.severity}</span></div>
        <div class="tactic-desc">${esc(t.description)}</div>
        ${t.evidence ? `<div class="tactic-evidence">${esc(t.evidence)}</div>` : ''}
      </div>`;
    });
    h += `</div>`;
  }

  h += `</div>`;
  return h;
}

/* ── SVG chart ── */
function buildChart(series, color) {
  const W=700,H=200,PL=50,PR=14,PT=12,PB=26;
  const cw=W-PL-PR, ch=H-PT-PB;
  const prices=series.map(p=>p.price);
  const mn=Math.min(...prices), mx=Math.max(...prices), rng=mx-mn||1;
  const pts=series.map((p,i)=>({
    x:PL+(i/(series.length-1))*cw,
    y:PT+ch-((p.price-mn)/rng)*ch,
    date:p.date, price:p.price
  }));
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=line+` L${pts[pts.length-1].x.toFixed(1)},${PT+ch} L${pts[0].x.toFixed(1)},${PT+ch} Z`;
  let yL=''; for(let i=0;i<=4;i++){const v=mn+(rng*i/4),y=PT+ch-(i/4)*ch;
    yL+=`<text x="${PL-7}" y="${y+4}" text-anchor="end" fill="#9ca3af" font-size="10">$${v.toFixed(0)}</text>`;
    yL+=`<line x1="${PL}" x2="${PL+cw}" y1="${y}" y2="${y}" stroke="#f3f4f6"/>`;
  }
  let xL='';[0,Math.floor(series.length/2),series.length-1].forEach(i=>{
    xL+=`<text x="${pts[i].x}" y="${H-4}" text-anchor="middle" fill="#9ca3af" font-size="10">${series[i].date.slice(0,7)}</text>`;
  });
  const c=color||'#10b981';
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${yL}${xL}
    <path d="${area}" fill="${c}" fill-opacity=".07"/>
    <path d="${line}" fill="none" stroke="${c}" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="4" fill="${c}"/>
    <circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="8" fill="${c}" fill-opacity=".15"/>
  </svg>`;
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmt(v){return v!=null?Number(v).toFixed(2):'—';}
