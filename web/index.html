<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TickClip.ai — Fiduciary AI Shopping Decisions</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #fafafa; color: #1a1a1a; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ── */
.container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

/* ── Header ── */
header {
  text-align: center; padding: 64px 0 32px;
}
header h1 {
  font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px;
}
header h1 span { color: #10b981; }
header p { color: #6b7280; font-size: 1.05rem; margin-top: 8px; }

/* ── Search ── */
.search-wrap {
  display: flex; gap: 8px; margin: 32px auto; max-width: 560px;
}
.search-wrap input {
  flex: 1; padding: 14px 18px; font-size: 1rem;
  border: 1px solid #d1d5db; border-radius: 10px;
  outline: none; transition: border-color .15s;
}
.search-wrap input:focus { border-color: #2563eb; }
.search-wrap button {
  padding: 14px 28px; font-size: 1rem; font-weight: 600;
  background: #1a1a1a; color: #fff; border: none; border-radius: 10px;
  cursor: pointer; transition: background .15s;
}
.search-wrap button:hover { background: #333; }
.search-wrap button:disabled { opacity: .5; cursor: not-allowed; }

/* ── Search Results ── */
.search-results {
  max-width: 560px; margin: 0 auto 24px; display: flex; flex-direction: column; gap: 6px;
}
.search-results button {
  width: 100%; text-align: left; padding: 12px 16px; background: #fff;
  border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer;
  font-size: .95rem; transition: background .1s;
}
.search-results button:hover { background: #f3f4f6; }
.search-results button code { color: #6b7280; font-size: .82rem; margin-left: 6px; }

/* ── Error / Loading ── */
.msg {
  text-align: center; padding: 24px; color: #6b7280; font-size: .95rem;
}
.msg.error { color: #ef4444; }

/* ── Evaluation Card ── */
.eval-card {
  background: #fff; border-radius: 14px; padding: 40px 32px;
  margin: 24px auto 48px; border: 1px solid #e5e7eb;
}

/* Badge */
.badge-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: 800; letter-spacing: 1px;
  padding: 10px 28px; border-radius: 10px; color: #fff;
}
.badge.TICK { background: #10b981; }
.badge.CLIP { background: #f59e0b; }
.badge.SKIP { background: #ef4444; }
.confidence { font-size: 1rem; color: #6b7280; font-weight: 500; }

/* Product header */
.product-head { display: flex; gap: 20px; margin-bottom: 28px; align-items: center; }
.product-head img {
  width: 90px; height: 90px; object-fit: contain; border-radius: 8px;
  background: #f9fafb; border: 1px solid #e5e7eb;
}
.product-head h2 { font-size: 1.15rem; font-weight: 600; }

/* Metrics grid */
.metrics {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 28px;
}
.metric {
  background: #f9fafb; border-radius: 10px; padding: 16px;
  text-align: center;
}
.metric .label { font-size: .78rem; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; }
.metric .value { font-size: 1.25rem; font-weight: 700; margin-top: 4px; }

/* Explanation */
.explanation { margin-bottom: 28px; }
.explanation h3 { font-size: .95rem; font-weight: 600; margin-bottom: 10px; }
.explanation ul { list-style: disc; padding-left: 20px; }
.explanation li { margin-bottom: 6px; font-size: .92rem; color: #374151; }

/* Chart */
.chart-wrap { margin-bottom: 32px; }
.chart-wrap h3 { font-size: .95rem; font-weight: 600; margin-bottom: 12px; }
.chart-wrap svg { width: 100%; height: 220px; }

/* Sections */
.section { margin-bottom: 32px; }
.section h3 { font-size: .95rem; font-weight: 600; margin-bottom: 12px; }
.card-list { display: flex; flex-direction: column; gap: 10px; }
.card-item {
  padding: 14px 16px; border: 1px solid #e5e7eb; border-radius: 10px;
  background: #fff; transition: box-shadow .15s;
}
.card-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.card-item .ci-title { font-weight: 600; font-size: .93rem; }
.card-item .ci-snippet { font-size: .84rem; color: #6b7280; margin-top: 4px; }
.card-item .ci-source { font-size: .76rem; color: #9ca3af; margin-top: 4px; }

/* Promise */
.promise {
  margin: 40px auto; max-width: 560px; text-align: center;
  border: 1px solid #d1fae5; background: #ecfdf5; border-radius: 12px;
  padding: 24px 20px;
}
.promise h4 { font-size: .9rem; font-weight: 700; color: #065f46; margin-bottom: 6px; }
.promise p { font-size: .85rem; color: #047857; }

/* Footer */
footer { text-align: center; padding: 32px 0; color: #9ca3af; font-size: .8rem; }

/* Back link */
.back-link {
  display: inline-block; margin-bottom: 16px; font-size: .88rem;
  color: #6b7280; cursor: pointer;
}
.back-link:hover { color: #1a1a1a; }
</style>
</head>
<body>
<div class="container" id="app">
  <header>
    <h1>Tick<span>Clip</span>.ai</h1>
    <p>Fiduciary AI shopping decisions — buy, wait, or skip.</p>
  </header>

  <!-- Search -->
  <div id="search-section">
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="Search product or paste Amazon ASIN / URL…" />
      <button id="search-btn" onclick="doSearch()">Evaluate</button>
    </div>
    <div id="search-results" class="search-results"></div>
    <div id="search-msg" class="msg"></div>
  </div>

  <!-- Evaluation -->
  <div id="eval-section" style="display:none"></div>

  <!-- Promise -->
  <div class="promise">
    <h4>Fiduciary Promise</h4>
    <p>We do not earn from pushing sales. We help you decide: buy, wait, or skip.</p>
  </div>

  <footer>&copy; 2026 TickClip.ai</footer>
</div>

<script>
const API = location.origin;
const $input   = document.getElementById('search-input');
const $btn     = document.getElementById('search-btn');
const $results = document.getElementById('search-results');
const $msg     = document.getElementById('search-msg');
const $search  = document.getElementById('search-section');
const $eval    = document.getElementById('eval-section');

$input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = $input.value.trim();
  if (!q) return;
  $btn.disabled = true;
  $results.innerHTML = '';
  $msg.className = 'msg';
  $msg.textContent = 'Searching…';

  // If it looks like an ASIN (10 alphanum uppercase or URL with /dp/), evaluate directly
  const asinMatch = q.match(/^[A-Z0-9]{10}$/) || q.match(/\/(?:dp|gp\/product|ASIN)\/([A-Z0-9]{10})/);
  if (asinMatch) {
    const asin = asinMatch[1] || q;
    $msg.textContent = '';
    $btn.disabled = false;
    return doEvaluate(asin);
  }

  try {
    const resp = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Search failed');
    $msg.textContent = '';
    const items = data.results || [];
    if (items.length === 0) { $msg.textContent = 'No results found.'; return; }
    items.forEach(item => {
      const btn = document.createElement('button');
      btn.innerHTML = `${item.title || 'Product'} <code>${item.asin}</code>`;
      btn.onclick = () => doEvaluate(item.asin);
      $results.appendChild(btn);
    });
  } catch (err) {
    $msg.className = 'msg error';
    $msg.textContent = err.message;
  } finally {
    $btn.disabled = false;
  }
}

async function doEvaluate(asin) {
  $search.style.display = 'none';
  $eval.style.display = '';
  $eval.innerHTML = '<div class="msg">Evaluating product…</div>';

  try {
    const resp = await fetch(`${API}/api/evaluate?asin=${asin}`);
    const d = await resp.json();
    if (!resp.ok) throw new Error(d.detail || 'Evaluation failed');
    renderEval(d);
  } catch (err) {
    $eval.innerHTML = `<div class="msg error">${err.message}</div>
      <div style="text-align:center"><span class="back-link" onclick="goBack()">&#8592; Back to search</span></div>`;
  }
}

function goBack() {
  $eval.style.display = 'none';
  $eval.innerHTML = '';
  $search.style.display = '';
}

function renderEval(d) {
  let html = `<span class="back-link" onclick="goBack()">&#8592; Back to search</span>`;
  html += `<div class="eval-card">`;

  // Badge
  html += `<div class="badge-row">
    <span class="badge ${d.decision}">${d.decision}</span>
    <span class="confidence">Confidence: ${d.confidence}%</span>
  </div>`;

  // Product
  html += `<div class="product-head">`;
  if (d.image) html += `<img src="${d.image}" alt="" />`;
  html += `<div><h2>${esc(d.title)}</h2><span style="color:#9ca3af;font-size:.82rem">${d.asin}</span></div></div>`;

  // Metrics
  html += `<div class="metrics">
    <div class="metric"><div class="label">Current</div><div class="value">$${fmt(d.current_price)}</div></div>
    <div class="metric"><div class="label">Historic Low</div><div class="value">$${fmt(d.hist_low)}</div></div>
    <div class="metric"><div class="label">90-Day Avg</div><div class="value">$${fmt(d.avg_90d)}</div></div>
    <div class="metric"><div class="label">Volatility</div><div class="value">${d.volatility_score != null ? (d.volatility_score * 100).toFixed(1) + '%' : '—'}</div></div>
    <div class="metric"><div class="label">Seller Risk</div><div class="value" style="text-transform:capitalize">${d.seller_risk}</div></div>
  </div>`;

  // Explanation
  if (d.explanation && d.explanation.length) {
    html += `<div class="explanation"><h3>Analysis</h3><ul>`;
    d.explanation.forEach(e => { html += `<li>${esc(e)}</li>`; });
    html += `</ul></div>`;
  }

  // Chart
  if (d.price_series && d.price_series.length > 1) {
    html += `<div class="chart-wrap"><h3>Price History</h3>${buildChart(d.price_series)}</div>`;
  }

  html += `</div>`; // end eval-card

  // Alternatives
  if (d.alternatives && d.alternatives.length) {
    html += `<div class="section"><h3>Better Alternatives</h3><div class="card-list">`;
    d.alternatives.forEach(a => {
      html += `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="card-item">
        <div class="ci-title">${esc(a.title)}</div>
        ${a.snippet ? `<div class="ci-snippet">${esc(a.snippet)}</div>` : ''}
        <div class="ci-source">${esc(a.source)}</div>
      </a>`;
    });
    html += `</div></div>`;
  }

  // DIY
  if (d.diy_articles && d.diy_articles.length) {
    html += `<div class="section"><h3>DIY / Repair / Substitutes</h3><div class="card-list">`;
    d.diy_articles.forEach(a => {
      html += `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="card-item">
        <div class="ci-title">${esc(a.title)}</div>
        ${a.snippet ? `<div class="ci-snippet">${esc(a.snippet)}</div>` : ''}
        <div class="ci-source">${esc(a.source)}</div>
      </a>`;
    });
    html += `</div></div>`;
  }

  $eval.innerHTML = html;
}

/* ── SVG chart ── */
function buildChart(series) {
  const W = 640, H = 200, PL = 50, PR = 16, PT = 12, PB = 28;
  const cw = W - PL - PR, ch = H - PT - PB;
  const prices = series.map(p => p.price);
  const mn = Math.min(...prices), mx = Math.max(...prices);
  const range = mx - mn || 1;

  const pts = series.map((p, i) => {
    const x = PL + (i / (series.length - 1)) * cw;
    const y = PT + ch - ((p.price - mn) / range) * ch;
    return { x, y, date: p.date, price: p.price };
  });

  const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area = line + ` L${pts[pts.length-1].x.toFixed(1)},${PT+ch} L${pts[0].x.toFixed(1)},${PT+ch} Z`;

  // Y axis labels
  const ySteps = 4;
  let yLabels = '';
  for (let i = 0; i <= ySteps; i++) {
    const val = mn + (range * i / ySteps);
    const y = PT + ch - (i / ySteps) * ch;
    yLabels += `<text x="${PL-8}" y="${y+4}" text-anchor="end" fill="#9ca3af" font-size="11">$${val.toFixed(0)}</text>`;
    yLabels += `<line x1="${PL}" x2="${PL+cw}" y1="${y}" y2="${y}" stroke="#f3f4f6" />`;
  }

  // X axis labels (first, mid, last)
  const xIdxs = [0, Math.floor(series.length/2), series.length-1];
  let xLabels = '';
  xIdxs.forEach(i => {
    xLabels += `<text x="${pts[i].x}" y="${H-4}" text-anchor="middle" fill="#9ca3af" font-size="11">${series[i].date.slice(0,7)}</text>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${yLabels}${xLabels}
    <path d="${area}" fill="rgba(16,185,129,0.08)" />
    <path d="${line}" fill="none" stroke="#10b981" stroke-width="2" stroke-linejoin="round" />
    <circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="4" fill="#10b981" />
  </svg>`;
}

/* ── Helpers ── */
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmt(v) { return v != null ? Number(v).toFixed(2) : '—'; }
</script>
</body>
</html>
